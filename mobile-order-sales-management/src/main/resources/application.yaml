spring:
  application:
    name: mobile-order-sales-management

  datasource:
    url: jdbc:postgresql://localhost:5432/mobile_order_db
    username: mobile_order_user
    password: mobile_order_password
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080